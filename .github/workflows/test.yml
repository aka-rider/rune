name: Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Install build dependencies
        run: brew install libgit2 pkg-config

      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test ./...

      - name: Vet
        env:
          CGO_ENABLED: "1"
        run: go vet ./...
